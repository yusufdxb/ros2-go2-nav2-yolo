# CHAMP Gait Parameters — Tuned for Unitree GO2
# Based on: arjun-sadananda/go2_nav2_ros2
# Key change: nominal_height reduced to improve GO2 stability in sim

knee_orientation: ">>"     # GO2 knee orientation

# Body height during walking (meters)
# Lower value = more stable in Gazebo Classic
nominal_height: 0.27       # Default CHAMP is ~0.30 — reduced for GO2 stability

# Speed limits
max_linear_velocity_x: 0.5      # m/s forward
max_linear_velocity_y: 0.3      # m/s sideways
max_angular_velocity_z: 1.0     # rad/s rotation

# Gait timing
stance_duration: 0.25           # seconds per foot contact

# Swing trajectory
swing_height: 0.04              # meters — how high the foot lifts
swing_depth: 0.005              # meters — penetration depth during stance

# Odometry correction
# CHAMP state estimation underestimates translation on GO2
# due to generic quadruped dimensions being used.
# This multiplier compensates (from arjun-sadananda/go2_nav2_ros2)
linear_velocity_multiplier: 2.0

# Contact detection
contact_threshold: 0.05         # Force threshold for foot contact (N)

# Body pose control
com_x_translation: 0.0         # COM offset in x (shift forward for uneven weight)
com_y_translation: 0.0
