<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1c2f54; }
      .label { font: 600 18px Arial, sans-serif; fill: #1c2f54; }
      .small { font: 500 14px Arial, sans-serif; fill: #3c5678; }
      .box { rx: 18; ry: 18; stroke-width: 3; }
      .sim { fill: #eef5ff; stroke: #6d8db8; }
      .nav { fill: #edf8ef; stroke: #5e9a72; }
      .per { fill: #fff5e8; stroke: #b88a44; }
      .flow { stroke: #415f84; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#415f84"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#fbfcfe"/>
  <text x="60" y="60" class="title">GO2 Gazebo Navigation Stack: Public Architecture</text>
  <text x="60" y="95" class="small">The simulation path and real-camera detector path are intentionally separated.</text>

  <rect x="60" y="170" width="240" height="100" class="box sim"/>
  <text x="105" y="212" class="label">Gazebo GO2 + Sensors</text>
  <text x="105" y="240" class="small">scan, depth, rendered camera topics</text>

  <rect x="370" y="120" width="260" height="90" class="box sim"/>
  <text x="410" y="160" class="label">scan_relay</text>
  <text x="410" y="188" class="small">DDS history / startup workaround</text>

  <rect x="370" y="260" width="260" height="90" class="box per"/>
  <text x="405" y="300" class="label">sim_person_detector</text>
  <text x="405" y="328" class="small">known target position publisher</text>

  <rect x="370" y="400" width="260" height="90" class="box per"/>
  <text x="405" y="440" class="label">detector_node</text>
  <text x="405" y="468" class="small">YOLOv8 + depth fusion for real camera path</text>

  <rect x="720" y="200" width="260" height="110" class="box nav"/>
  <text x="760" y="242" class="label">Nav2 + SLAM Toolbox</text>
  <text x="760" y="270" class="small">map, localization, planning, control</text>
  <text x="760" y="292" class="small">with navigator_node goal logic</text>

  <rect x="1040" y="220" width="180" height="110" class="box nav"/>
  <text x="1085" y="264" class="label">/cmd_vel</text>
  <text x="1080" y="292" class="small">to CHAMP gait</text>

  <path d="M300 200 L370 165" class="flow"/>
  <path d="M300 220 L370 305" class="flow"/>
  <path d="M300 240 L370 445" class="flow"/>
  <path d="M630 165 L720 225" class="flow"/>
  <path d="M630 305 L720 255" class="flow"/>
  <path d="M630 445 L720 285" class="flow"/>
  <path d="M980 255 L1040 275" class="flow"/>

  <rect x="60" y="590" width="1160" height="70" fill="#eef3f7" stroke="#c7d4e0" rx="16" ry="16"/>
  <text x="95" y="633" class="small">Publish results separately for the sim path and real-camera path. Do not imply the Gazebo demo validates YOLO on the rendered person model.</text>
</svg>
